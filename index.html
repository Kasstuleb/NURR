<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NURR — Wallpaper Studio</title>
<link rel="stylesheet" href="https://use.typekit.net/uib5hvg.css" />
<style>
/* ─── NURR Design tokens ──────────────────────────────────────────────────── */
:root {
  --bg:          #f4ede0;
  --paper:       #f7f1e4;
  --paper-2:     #ede5d1;
  --ink:         #0a0540;
  --ink-2:       #08015F;
  --ink-dim:     rgba(10, 5, 64, 0.55);
  --ink-faint:   rgba(10, 5, 64, 0.28);
  --rule:        rgba(10, 5, 64, 0.18);
  --rule-soft:   rgba(10, 5, 64, 0.10);
  --accent:      #FC6C3D;
  --accent-soft: #f7d3c0;
  --shadow:      0 24px 80px rgba(10,5,64,0.25), 0 4px 16px rgba(10,5,64,0.10);

  --nurr-blue:      #08015F;
  --nurr-panel:     #f7f1e4;
  --nurr-panel-soft:#eef3ed;
}

/* ─── Reset ───────────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg); color: var(--ink);
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
#root { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
canvas.stage { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
body.is-picking-color, body.is-picking-color * { cursor: none !important; }

/* ─── NURR brand wordmark ─────────────────────────────────────────────────── */
.nurr-brand {
  position: absolute; left: 116px; top: 34px; z-index: 9;
  pointer-events: none;
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  font-size: 58px; line-height: 0.86; letter-spacing: 0.025em; font-weight: 900;
  transform: scaleX(1.12); transform-origin: left top;
  color: var(--nurr-blue);
}

/* ─── Vertical rail (mode switcher) ──────────────────────────────────────── */
.rail {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 88px; z-index: 8; background: transparent;
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 168px 0 66px;
  align-items: center;
  pointer-events: none;
}
.rail-group {
  display: flex; flex-direction: column; gap: 66px; align-items: center;
  pointer-events: auto;
}
.rail-item {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  font-size: 24px; line-height: 1; letter-spacing: 0.025em;
  text-transform: none; font-weight: 300;
  color: rgba(244, 237, 224, 0.88);
  text-shadow: 0 1px 18px rgba(8, 1, 95, 0.35);
  cursor: pointer; user-select: none;
  transition: color 0.25s ease;
  padding: 4px 0;
  background: transparent; border: none;
}
.rail-item:hover { color: rgba(244, 237, 224, 1); }
.rail-item.active { color: #fffaf0; }
.rail-item .num { display: none; }
.rail-foot { display: none; }

/* ─── Floating panel ──────────────────────────────────────────────────────── */
.panel {
  position: absolute; top: 86px; right: 30px;
  width: 318px; max-height: calc(100vh - 116px);
  background: var(--nurr-panel);
  border: 1px solid var(--rule);
  box-shadow: 0 20px 64px rgba(8,1,95,0.16), 0 2px 8px rgba(8,1,95,0.08);
  z-index: 10;
  display: flex; flex-direction: column;
  overflow: visible;
  user-select: none;
  color: var(--ink);
  border-radius: 0;
}
.panel.collapsed { width: auto; max-height: none; }

.panel-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 16px 22px 14px;
  min-height: 92px;
  border-bottom: 1px solid var(--rule);
  cursor: grab; background: var(--nurr-panel);
}
.panel-header:active { cursor: grabbing; }

.panel-eyebrow {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 10px; letter-spacing: 0.03em; text-transform: uppercase;
  font-weight: 700; color: #151515;
  margin-bottom: 9px;
}
.panel-title {
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  font-size: 22px; line-height: 0.94; font-style: normal;
  font-weight: 700; letter-spacing: 0.005em; color: var(--nurr-blue);
  max-width: 190px;
}
.panel-title .amp { color: var(--accent); }

.panel-body {
  overflow-y: auto; overflow-x: visible;
  padding: 12px 22px 18px;
  max-height: calc(100vh - 202px);
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

/* ─── Icon buttons ────────────────────────────────────────────────────────── */
.icon-btn {
  width: 23px; height: 23px; border-radius: 50%;
  background: transparent; border: 1px solid var(--rule);
  color: var(--ink-2);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.icon-btn:hover { background: var(--ink-2); color: var(--paper); border-color: var(--ink-2); }
.icon-btn:disabled { opacity: 0.32; cursor: not-allowed; }
.header-actions { display: flex; gap: 5px; }

/* ─── Sections ────────────────────────────────────────────────────────────── */
.section { margin-top: 16px; }
.section:first-child { margin-top: 0; }
.section-label {
  display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 1px solid var(--rule-soft);
  padding-bottom: 6px; margin-bottom: 11px;
}
.section-label .name {
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  font-style: normal; font-size: 17px; font-weight: 400; color: var(--ink-2);
}
.section-label .value {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-dim);
}

/* ─── Slider ──────────────────────────────────────────────────────────────── */
.slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 1px;
  background: var(--rule); outline: none; cursor: pointer; margin: 8px 0;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer; transition: transform 0.1s;
  border: 2px solid var(--paper); box-shadow: 0 0 0 1px var(--accent);
}
.slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
.slider::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  border: 2px solid var(--paper); box-shadow: 0 0 0 1px var(--accent);
}

/* ─── Swatches / palette editor ───────────────────────────────────────────── */
.swatches { display: flex; gap: 9px; flex-wrap: wrap; align-items: center; }
.swatch {
  width: 32px; height: 32px;
  border: 1px solid rgba(8, 1, 95, 0.14);
  cursor: pointer; position: relative;
  transition: transform 0.12s;
  border-radius: 50%;
}
.swatch:hover { transform: translateY(-1px) scale(1.06); }
.swatch.active { outline: 2px solid var(--nurr-blue); outline-offset: 3px; }
.swatch input[type="color"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.swatch.add {
  background: transparent; border: 1px dashed var(--rule);
  color: var(--ink-faint);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.swatch.add:hover { color: var(--accent); border-color: var(--accent); }
.swatch.remove-target:hover::after {
  content: ''; position: absolute; top: -3px; right: -3px;
  width: 12px; height: 12px;
  background: var(--accent); border: 1px solid var(--paper); border-radius: 50%;
}

.palette-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  max-height: 140px; overflow-y: auto; padding-right: 4px;
}
.palette-card {
  cursor: pointer; padding: 3px;
  border: 1px solid transparent; transition: border-color 0.15s;
  display: flex; height: 32px;
}
.palette-card:hover { border-color: var(--rule); }
.palette-card.active { border-color: var(--ink-2); }
.palette-card span { flex: 1; height: 100%; }

/* ─── Buttons ─────────────────────────────────────────────────────────────── */
.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn {
  flex: 1; padding: 8px 12px;
  background: var(--paper); border: 1px solid var(--rule);
  color: var(--ink-2);
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
  border-radius: 999px;
}
.btn:hover { background: var(--ink-2); color: var(--paper); border-color: var(--ink-2); }
.btn.primary { background: var(--accent); color: var(--paper); border-color: var(--accent); }
.btn.primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
.btn.active { background: var(--ink-2); color: var(--paper); border-color: var(--ink-2); }
.btn-italic {
  font-family: "Instrument Serif", serif; font-style: italic;
  text-transform: none; letter-spacing: 0; font-size: 16px;
}
.compact-row { margin-top: 10px; }

/* ─── Segmented control ───────────────────────────────────────────────────── */
.seg {
  display: flex; background: transparent;
  border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
}
.seg-opt {
  flex: 1; padding: 10px 6px;
  background: transparent; border: none; border-right: 1px solid var(--rule);
  color: var(--ink-dim);
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.seg-opt:last-child { border-right: none; }
.seg-opt.active { background: var(--ink-2); color: var(--paper); }
.seg-opt:hover:not(.active) { color: var(--ink); background: var(--paper-2); }

/* ─── Geometric layout cards ──────────────────────────────────────────────── */
.layout-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.layout-card {
  aspect-ratio: 1; position: relative;
  background: var(--paper-2); border: 1px solid var(--rule);
  cursor: pointer; transition: border-color 0.15s, transform 0.12s;
  overflow: hidden;
}
.layout-card:hover { transform: translateY(-1px); }
.layout-card.active { border-color: var(--ink-2); }
.layout-card.active::after {
  content: ''; position: absolute; inset: 0;
  box-shadow: inset 0 0 0 2px var(--ink-2); pointer-events: none;
}
.layout-card svg { width: 100%; height: 100%; display: block; }

/* ─── Help text ───────────────────────────────────────────────────────────── */
.help {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 13px; line-height: 1.32;
  color: var(--ink-dim);
  margin-top: 18px; padding-top: 16px;
  border-top: 1px solid var(--rule-soft);
}
.help em { color: var(--accent); }
.help kbd {
  display: inline-block;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 11px; padding: 1px 6px;
  border: 1px solid var(--rule); border-radius: 3px;
  color: var(--ink); margin: 0 1px;
}
.compact-help { margin-top: 13px; }

/* ─── Nature / photo mode ─────────────────────────────────────────────────── */
.nature-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  margin-top: 4px; max-height: 220px; overflow-y: auto; padding-right: 4px;
}
.nature-thumb {
  aspect-ratio: 1; overflow: hidden;
  background: var(--paper-2); border: 1px solid transparent;
  cursor: pointer; position: relative;
  transition: border-color 0.15s;
}
.nature-thumb.active { border-color: var(--ink-2); }
.nature-thumb.active::after {
  content: ''; position: absolute; inset: 0;
  box-shadow: inset 0 0 0 2px var(--ink-2);
}
.nature-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.nature-stage { z-index: 1; }
.nature-fallback-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; pointer-events: none;
}

.drop-zone {
  border: 1px dashed var(--rule); padding: 12px;
  text-align: center; color: var(--ink-dim);
  font-size: 13px; line-height: 1.4;
  cursor: pointer; transition: all 0.2s; margin-top: 10px;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent); color: var(--ink);
  background: rgba(252, 108, 61, 0.06);
}
.drop-zone strong { color: var(--ink-2); font-weight: 600; }
.drop-zone .code {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 11px; background: var(--paper-2); padding: 2px 6px;
  color: var(--ink-2); border-radius: 2px;
}

.folder-widget {
  margin-top: 12px; padding: 12px 13px;
  border: 1px solid var(--rule-soft); background: rgba(255,255,255,0.24);
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 12px; line-height: 1.35; color: rgba(10,5,64,0.72);
}
.folder-title {
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  font-size: 15px; color: var(--nurr-blue); margin-bottom: 7px;
}
.folder-widget p { margin: 7px 0; }
.folder-widget code {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 11px; background: rgba(8,1,95,0.07); padding: 2px 5px; color: var(--nurr-blue);
}

/* ─── Color picker / wheel ────────────────────────────────────────────────── */
.color-wheel-card {
  position: fixed; right: 142px; top: 292px;
  width: 270px; padding: 24px 27px 25px;
  background: var(--nurr-panel-soft); border-radius: 18px; z-index: 40;
  box-shadow: 0 24px 72px rgba(10,5,64,0.18); border: 0;
}
.color-wheel-surface {
  position: relative; height: 142px; border-radius: 32px;
  overflow: hidden; cursor: none; border: 0; touch-action: none;
  background:
    linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,255,255,0.72) 9%, rgba(255,255,255,0) 29%, rgba(0,0,0,0) 58%, rgba(0,0,0,0.95) 100%),
    linear-gradient(to right, #ff2b2b 0%, #ff8e1f 9%, #ffe436 18%, #57f04d 31%, #00d9a6 43%, #13c9ff 56%, #2261ff 68%, #7a41ff 80%, #ff4fe9 91%, #ff2b2b 100%);
}
.color-wheel-surface::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(to right, rgba(255,255,255,0.52), rgba(255,255,255,0) 18%, rgba(0,0,0,0) 74%, rgba(0,0,0,0.32));
  mix-blend-mode: soft-light;
}
.color-readout {
  margin-top: 18px; border-top: 1px solid rgba(10,5,64,0.28);
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: #101010;
}
.color-readout div {
  display: flex; gap: 10px; padding: 7px 0;
  border-bottom: 1px solid rgba(10,5,64,0.28);
  font-size: 13px; letter-spacing: 0.01em; white-space: nowrap;
}
.color-readout span:first-child { width: 52px; font-weight: 500; }
.color-readout strong { font-weight: 400; }

.eyedropper-follow {
  position: fixed; z-index: 99999; width: 54px; height: 54px;
  transform: translate3d(-27px, -27px, 0);
  pointer-events: none; display: flex; align-items: center; justify-content: center;
  will-change: left, top;
}
.eyedropper-follow svg {
  width: 28px; height: 28px; color: #050505;
  filter: drop-shadow(0 1px 2px rgba(255,255,255,0.55));
  z-index: 2; transform: translate(3px, -3px);
}
.eyedropper-color {
  position: absolute; width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.92);
  box-shadow: 0 4px 18px rgba(0,0,0,0.24); opacity: 0.96; z-index: 1;
}

/* ─── Collection drawer ───────────────────────────────────────────────────── */
.collection-drawer {
  position: absolute; right: 30px; bottom: 26px;
  width: 318px; max-height: 210px; z-index: 12;
  background: rgba(247,241,228,0.96); border: 1px solid var(--rule);
  box-shadow: 0 12px 42px rgba(8,1,95,0.14);
  padding: 12px;
  font-family: "Helvetica Neue", Arial, sans-serif;
}
.collection-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; margin-bottom: 9px;
  color: var(--nurr-blue); font-size: 12px; font-weight: 700;
}
.collection-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  max-height: 96px; overflow: auto;
}
.collection-tile { position: relative; }
.collection-item {
  display: block; border: 1px solid var(--rule);
  background: var(--paper); padding: 2px;
  text-decoration: none;
}
.collection-item img { display: block; width: 100%; aspect-ratio: 16/9; object-fit: cover; }
.collection-delete {
  position: absolute; top: -4px; right: -4px; width: 16px; height: 16px;
  border-radius: 50%; background: var(--accent); color: white;
  border: none; cursor: pointer; font-size: 10px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.collection-tile:hover .collection-delete { opacity: 1; }
.collection-actions { display: flex; gap: 6px; margin-top: 10px; }

/* ─── Toggle row (abstract mode) ─────────────────────────────────────────── */
.toggle-row { display: flex; gap: 8px; }

/* ─── Toast notification ──────────────────────────────────────────────────── */
.snapshot-toast {
  position: absolute; bottom: 36px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--ink-2); color: var(--paper);
  padding: 12px 22px; border-radius: 999px;
  font-family: "Instrument Serif", serif; font-style: italic; font-size: 18px;
  box-shadow: var(--shadow); z-index: 20; pointer-events: none;
  opacity: 0; transition: opacity 0.35s, transform 0.35s;
}
.snapshot-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── Corner mark ─────────────────────────────────────────────────────────── */
.corner-mark {
  position: absolute; right: 28px; bottom: 28px;
  z-index: 5; pointer-events: none; text-align: right; color: var(--ink-faint);
}
.corner-mark .big {
  font-family: "Instrument Serif", serif; font-style: italic;
  font-size: 22px; color: var(--ink-2); line-height: 1;
}
.corner-mark .small {
  font-family: "EB Garamond", serif;
  font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; margin-top: 4px;
}

/* ─── Placeholder (photo mode with no image) ──────────────────────────────── */
.placeholder-overlay {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; pointer-events: none; z-index: 2;
  background: linear-gradient(135deg, #f4ede0 0%, #ede2c8 100%);
}
.placeholder-card {
  max-width: 480px; padding: 36px 40px;
  background: var(--paper); border: 1px solid var(--rule);
  box-shadow: var(--shadow); text-align: left; pointer-events: auto;
}
.placeholder-card h2 {
  font-family: "monotalic", "Helvetica Neue", Arial, sans-serif;
  font-size: 32px; font-weight: 700; color: var(--ink-2);
  margin-bottom: 10px; line-height: 1.05;
}
.placeholder-card p {
  font-family: "EB Garamond", serif;
  font-size: 15px; color: var(--ink); line-height: 1.55;
}
.placeholder-card code {
  background: var(--paper-2); padding: 2px 7px; border-radius: 2px;
  color: var(--ink-2); font-size: 13px;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

/* ─── Abstract formation grid ─────────────────────────────────────────────── */
.formation-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.formation-card {
  aspect-ratio: 4/3; position: relative;
  border: 1px solid var(--rule); cursor: pointer;
  overflow: hidden; transition: border-color 0.15s;
  background: var(--paper-2);
}
.formation-card:hover { border-color: var(--ink-dim); }
.formation-card.active { border-color: var(--ink-2); }
.formation-card.active::after {
  content: ''; position: absolute; inset: 0;
  box-shadow: inset 0 0 0 2px var(--ink-2); pointer-events: none;
}
.formation-canvas { width: 100%; height: 100%; display: block; }
.formation-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 3px 5px;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.35);
  text-align: center;
}
</style>

  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
// helpers.js — shared WebGL utilities, color math, React hooks, palette presets.
// No JSX — loads as a regular <script> tag before Babel modules.

// ─── WebGL ────────────────────────────────────────────────────────────────────
function compileShader(gl, type, source) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, source);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:', gl.getShaderInfoLog(sh), source);
    gl.deleteShader(sh); return null;
  }
  return sh;
}
function compileProgram(gl, vsSrc, fsSrc) {
  const vs = compileShader(gl, gl.VERTEX_SHADER, vsSrc);
  const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSrc);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {

// palette.js — NurrPaletteEditor: swatch row + canvas eyedropper + color wheel card.
// Exposes: window.NurrPaletteEditor

const { useEffect, useRef, useState } = React;

function NurrPaletteEditor({ colors, setColors, countLabel, allowAdd=true, minColors=2, maxColors=4, compact=false }) {
  const [picker, setPicker] = useState(null);
  const [livePos, setLivePos] = useState({ x:-100, y:-100 });
  const [liveColor, setLiveColor] = useState('#08015F');
  const pickerRef = useRef(null);
  const liveRef = useRef({ x:-100, y:-100, color:'#08015F' });
  const rafRef = useRef(null);
  const wheelRef = useRef(null);

  const normalizeHex = (hex) => {
    if (!hex) return '#000000';
    const h = String(hex).trim();
    if (/^#[0-9a-fA-F]{6}$/.test(h)) return h.toUpperCase();
    return '#000000';
  };
  const setColor = (i, hex) => {
    const next = [...colors]; next[i] = normalizeHex(hex); setColors(next);
  };
  const addColor = () => {
    if (!allowAdd || colors.length >= maxColors) return;
    setColors([...colors, WP.hslToHex(Math.random()*360, 0.72, 0.56)]);
  };
  const removeColor = (i) => {
    if (!allowAdd || colors.length <= minColors) return;
    setColors(colors.filter((_,idx) => idx !== i));
  };
  const randomize = () => {
    const p = WP.PALETTE_PRESETS[Math.floor(Math.random()*WP.PALETTE_PRESETS.length)];
    setColors(p.slice(0, Math.max(minColors, Math.min(maxColors, colors.length))));
  };

  const hexToRgbObj = (hex) => {
    const clean = normalizeHex(hex).replace('#','');

  };

    const rr=r/255, gg=g/255, bb=b/255;
    const k = 1-Math.max(rr,gg,bb);
    if (k >= 0.999) return {c:0,m:0,y:0,k:100};
    return {c:Math.round(((1-rr-k)/(1-k))*100), m:Math.round(((1-gg-k)/(1-k))*100), y:Math.round(((1-bb-k)/(1-k))*100), k:Math.round(k*100)};
  };

  const colorFromWheelEvent = (e) => {
    const rect = wheelRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width));
    const y = Math.max(0, Math.min(1, (e.clientY-rect.top)/rect.height));
    const hue = x * 360;
    const sat = Math.min(1, 0.16 + y*0.84);
    const light = 0.08 + (1-y)*0.86;
    return WP.hslToHex(hue, sat, light);
  };

  const sampleCanvasAt = (clientX, clientY) => {
    const canvases = Array.from(document.querySelectorAll('canvas.stage')).reverse();
    for (const canvas of canvases) {
      const rect = canvas.getBoundingClientRect();
      if (clientX<rect.left||clientX>rect.right||clientY<rect.top||clientY>rect.bottom) continue;
      const x = Math.floor((clientX-rect.left)/rect.width*canvas.width);
      const yTop = Math.floor((clientY-rect.top)/rect.height*canvas.height);
      try {
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

          const px = new Uint8Array(4);
          const yGL = Math.max(0, Math.min(canvas.height-1, canvas.height-1-yTop));

  };

  useEffect(() => { pickerRef.current = picker; }, [picker]);

  useEffect(() => {
    if (!picker) return;
    document.body.classList.add('is-picking-color');
    const isWheelPoint = (x,y) => {
      const el = document.elementFromPoint(x,y);
      return !!(el && el.closest && el.closest('.color-wheel-surface'));
    };
    const isReadoutPoint = (x,y) => {
      const el = document.elementFromPoint(x,y);
      return !!(el && el.closest && el.closest('.color-readout'));
    };
    const getPointColor = (x,y) => {
      if (isWheelPoint(x,y)) return colorFromWheelEvent({clientX:x,clientY:y});
      return sampleCanvasAt(x,y) || liveRef.current.color || pickerRef.current?.color;
    };
    const flush = () => {
      rafRef.current = null;
      setLivePos({x:liveRef.current.x, y:liveRef.current.y});
      setLiveColor(liveRef.current.color);
      setPicker(p => p ? {...p, color:liveRef.current.color} : p);
    };
    const queue = (x,y) => {
      liveRef.current = {x,y, color:normalizeHex(getPointColor(x,y))};
      if (!rafRef.current) rafRef.current = requestAnimationFrame(flush);
    };
    const move = (e) => queue(e.clientX, e.clientY);
    const down = (e) => {
      const current = pickerRef.current;
      if (!current) return;
      if (isReadoutPoint(e.clientX, e.clientY)) return;
      const picked = normalizeHex(getPointColor(e.clientX,e.clientY) || current.color);
      setColor(current.idx, picked);
      setPicker(null); pickerRef.current = null;
      e.preventDefault(); e.stopPropagation();
    };

    document.addEventListener('mousemove', move, true);
    document.addEventListener('pointerdown', down, true);
    return () => {
      document.body.classList.remove('is-picking-color');
      document.removeEventListener('pointermove', move, true);
      document.removeEventListener('mousemove', move, true);
      document.removeEventListener('pointerdown', down, true);
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [!!picker, colors]);

  const openPicker = (i, e) => {
    const color = normalizeHex(colors[i]);
    liveRef.current = {x:e.clientX, y:e.clientY, color};
    setLiveColor(color); setLivePos({x:e.clientX, y:e.clientY});
    const next = {idx:i, color};
    pickerRef.current = next; setPicker(next);
    e.preventDefault(); e.stopPropagation();
  };

  return (
    <>
      <div className="section palette-section">
        <div className="section-label">
          <span className="name">Palette</span>
          <span className="value">{countLabel || `${colors.length} of ${maxColors}`}</span>
        </div>
        <div className="swatches">
          {colors.map((c,i) => (
            <button key={i} type="button"
              className={'swatch remove-target'+(picker?.idx===i?' active':'')}
              style={{background:c}}
              onClick={(e)=>openPicker(i,e)}
              onContextMenu={(e)=>{e.preventDefault();removeColor(i);}}
              title="Click to pick · Right-click to remove" />
          ))}
          {allowAdd && colors.length < maxColors &&
            <button type="button" className="swatch add" onClick={addColor} title="Add color">+</button>
          }
        </div>
        <div className="btn-row compact-row">
          <button className="btn btn-italic" onClick={randomize}>{compact ? 'Shuffle' : 'Shuffle palette'}</button>
        </div>
      </div>

      {picker && (
        <>
          <div className="color-wheel-card">
            <div ref={wheelRef} className="color-wheel-surface"
              title="Move over the spectrum or artwork, then click to select" />
            <div className="color-readout">
              <div><span>HEX</span><strong>{activeColor}</strong></div>
              <div><span>RGB</span><strong>{rgbObj.r}, {rgbObj.g}, {rgbObj.b}</strong></div>
              <div><span>CMYK</span><strong>{cmykObj.c}% {cmykObj.m}% {cmykObj.y}% {cmykObj.k}%</strong></div>
            </div>
          </div>
          <div className="eyedropper-follow" style={{left:livePos.x, top:livePos.y}}>
            <div className="eyedropper-color" style={{background:activeColor}} />
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <path fill="currentColor" d="M44.7 6.6a7 7 0 0 1 9.9 9.9l-7.1 7.1 4.2 4.2-6.4 6.4-4.2-4.2-20 20c-1.1 1.1-2.5 1.8-4 2.1L6.8 54.4l2.3-10.3c.3-1.5 1-2.9 2.1-4l20-20-4.2-4.2 6.4-6.4 4.2 4.2 7.1-7.1Z"/>
            </svg>
          </div>
        </>
      )}
    </>
  );
}

window.NurrPaletteEditor = NurrPaletteEditor;
  </script>

// gradient.js — Mode 1: grainy gradient field with WebGL.
// Exposes: window.GradientMode, window.GradientControls, window.GRADIENT_DEFAULTS

const { useEffect: gmUE, useRef: gmUR, useState: gmUS } = React;

const GRADIENT_FS = `
precision highp float;
varying vec2 v_uv;
uniform float u_time;
uniform vec2  u_resolution;
uniform vec2  u_mouse;
uniform vec2  u_mouseRaw;
uniform float u_clickPulse;
uniform float u_grain;
uniform float u_flow;
uniform int   u_count;
uniform vec3  u_color0;
uniform vec3  u_color1;
uniform vec3  u_color2;
uniform vec3  u_color3;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

void main(){
  vec2 uv = v_uv;
  vec2 aspect = vec2(u_resolution.x / u_resolution.y, 1.0);
  vec2 p = (uv - 0.5) * aspect;
  vec2 m = (u_mouse - 0.5) * aspect * 1.8;
  vec2 mr = (u_mouseRaw - 0.5) * aspect;

  float t = u_time * 0.22 * u_flow;
  vec2 warp = vec2(
    sin(p.x * 1.4 + p.y * 0.8 + t) + sin(p.y * 2.2 - t * 0.7) * 0.6,
    cos(p.y * 1.4 - p.x * 0.6 - t * 0.8) + cos(p.x * 2.1 + t * 0.5) * 0.6
  );
  vec2 toMouse = m - p;
  float dM = length(toMouse) + 0.001;
  warp += toMouse * (0.35 / (dM + 0.4));
  vec2 wp = p + warp * 0.32 * u_flow;

  float dmr = distance(p, mr);
  float ripple = sin(dmr * 18.0 - u_clickPulse * 9.0) * exp(-dmr * 2.2) * u_clickPulse * 0.42;
  wp += normalize(toMouse + 0.0001) * ripple;

  float cnt = float(u_count);
  float aT = u_time * 0.18 * u_flow;
  vec2 an0 = m*0.55 + vec2(cos(aT+0.0),   sin(aT+0.0))   * (0.55 + 0.18*sin(u_time*0.4));
  vec2 an1 = m*0.55 + vec2(cos(aT+1.57),  sin(aT+1.57))  * (0.55 + 0.18*sin(u_time*0.4+1.0));
  vec2 an2 = m*0.55 + vec2(cos(aT+3.14),  sin(aT+3.14))  * (0.55 + 0.18*sin(u_time*0.4+2.0));
  vec2 an3 = m*0.55 + vec2(cos(aT+4.71),  sin(aT+4.71))  * (0.55 + 0.18*sin(u_time*0.4+3.0));

  float d0 = distance(wp, an0);
  float d1 = distance(wp, an1);
  float d2 = distance(wp, an2);
  float d3 = distance(wp, an3);
  float w0 = 1.0 / (d0*d0*5.5 + 0.08);
  float w1 = 1.0 / (d1*d1*5.5 + 0.08);
  float w2 = 1.0 / (d2*d2*5.5 + 0.08);
  float w3 = 1.0 / (d3*d3*5.5 + 0.08);
  float k1 = step(2.0, cnt); float k2 = step(3.0, cnt); float k3 = step(4.0, cnt);
  vec3 acc = u_color0*w0 + u_color1*w1*k1 + u_color2*w2*k2 + u_color3*w3*k3;
  float wsum = w0 + w1*k1 + w2*k2 + w3*k3;
  vec3 col = acc / max(wsum, 0.0001);

  float g = hash(uv * u_resolution + u_time*60.0) - 0.5;

  float vg = smoothstep(1.25, 0.25, length(uv - 0.5));

  gmUE(() => {
    const canvas = canvasRef.current;
    const gl = canvas.getContext('webgl', { preserveDrawingBuffer:true, antialias:false });
    if (!gl) return;

    const prog = WP.compileProgram(gl, WP.VS_FULLSCREEN, GRADIENT_FS);
    progRef.current = prog;
    gl.useProgram(prog);
    WP.createQuadGeometry(gl, prog);

    const onDown = (e) => {
      if (e.target.closest('.panel,.icon-btn,.rail,.layout-card,.palette-card,.nature-thumb,.swatch,.color-wheel-card,.eyedropper-follow,button,input,.drop-zone')) return;
      stateRef.current.pulse = 1.0;

    window.addEventListener('mousedown', onDown);
    return () => window.removeEventListener('mousedown', onDown);
  }, []);

  const drawAt = (targetW, targetH) => {
    const gl = glRef.current; const prog = progRef.current;
    if (!gl || !prog) return;
    gl.viewport(0, 0, targetW, targetH);
    const m = mouseRef.current;
    const t = performance.now() / 1000;
    gl.useProgram(prog);
    gl.uniform1f(gl.getUniformLocation(prog,'u_time'), t);
    gl.uniform2f(gl.getUniformLocation(prog,'u_resolution'), targetW, targetH);
    gl.uniform2f(gl.getUniformLocation(prog,'u_mouse'), m.chaosX, 1-m.chaosY);
    gl.uniform2f(gl.getUniformLocation(prog,'u_mouseRaw'), m.x, 1-m.y);
    gl.uniform1f(gl.getUniformLocation(prog,'u_clickPulse'), stateRef.current.pulse);
    gl.uniform1f(gl.getUniformLocation(prog,'u_grain'), tweaks.grain);
    gl.uniform1f(gl.getUniformLocation(prog,'u_flow'), tweaks.flow);
    gl.uniform1i(gl.getUniformLocation(prog,'u_count'), tweaks.colors.length);
    for (let i=0; i<4; i++) {
      const hex = tweaks.colors[i] || tweaks.colors[tweaks.colors.length-1] || '#000000';
      const [r,g,b] = WP.hexToRGB(hex);
      gl.uniform3f(gl.getUniformLocation(prog,`u_color${i}`), r, g, b);
    }
    gl.drawArrays(gl.TRIANGLES, 0, 6);
  };

  WP.useAnimationLoop((t, dt) => {
    const canvas = canvasRef.current; if (!canvas) return;
    stateRef.current.pulse *= Math.exp(-dt*1.4);

  });

  gmUE(() => {
    registerSnapshot(() => {

      WP.downloadCanvas(canvas, `gradient-${Date.now()}.png`);
      requestAnimationFrame(() => { canvas.width=ow; canvas.height=oh; canvas.style.width=osw; canvas.style.height=osh; });
    });
  }, [tweaks, registerSnapshot]);

}

      ctx.fillStyle = palette[s.colorIdx] || '#000';
      const baseSx = s.kind==='rect' ? s.x+s.w/2 : s.x;
      const baseSy = s.kind==='rect' ? s.y+s.h/2 : s.y;
      const vectorDistance = tweaks.vectorDistance ?? 1;
      const sx = 0.5 + (baseSx - 0.5) * vectorDistance;
      const sy = 0.5 + (baseSy - 0.5) * vectorDistance;
      const dx=m.chaosX-sx, dy=m.chaosY-sy;
      const d2=dx*dx+dy*dy;
      const fall=Math.exp(-d2*2.4);
      const pullX=mvx*(0.4+fall*1.6)*0.12, pullY=mvy*(0.4+fall*1.6)*0.12;

      const driftY=Math.cos(t*(0.25+i*0.05)+i*1.3)*0.008;

      const py=(sy+pullY+wy+driftY)*unit+offY;

        const w=s.w*unit*(tweaks.vectorScale??1), h=s.h*unit*(tweaks.vectorScale??1);
        const rot=(s.rot||0)+fall*mvx*0.4+wave*0.3;
        ctx.save(); ctx.translate(px,py); ctx.rotate(rot); ctx.fillRect(-w/2,-h/2,w,h); ctx.restore();
      } else if (s.kind==='circle') {
        const r=s.r*unit*(tweaks.vectorScale??1)*(1+wave*0.15+fall*0.06);
        ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
      } else if (s.kind==='blob') {
        const r=s.r*unit*(tweaks.vectorScale??1)*(1+wave*0.1);
        const amp=(s.blobAmp||0.18)+fall*0.06+Math.sin(t*0.6+i)*0.02;

        ctx.save(); ctx.translate(px,py); drawBlob(ctx,0,0,r,seed,amp,0); ctx.restore();

      ctx.globalCompositeOperation='overlay';
      ctx.imageSmoothingEnabled=false;
      ctx.drawImage(gCanvas,0,0,W,H);
      ctx.restore();
    }
  };

  WP.useAnimationLoop((t, dt) => {
    const canvas = canvasRef.current; if (!canvas) return;
    stateRef.current.pulse *= Math.exp(-dt*1.6);
    drawAt(canvas.width, canvas.height);
  });

  geomUE(() => {
    registerSnapshot(() => {
      const canvas=canvasRef.current; if(!canvas) return;
      const ow=canvas.width, oh=canvas.height, osw=canvas.style.width, osh=canvas.style.height;
      canvas.width=3840; canvas.height=2160; drawAt(3840,2160);
      WP.downloadCanvas(canvas,`geometric-${Date.now()}.png`);
      requestAnimationFrame(()=>{ canvas.width=ow; canvas.height=oh; canvas.style.width=osw; canvas.style.height=osh; });
    });
  }, [tweaks, registerSnapshot]);

  return <canvas ref={canvasRef} className="stage" />;
}

// nature.js — Mode 3: Photo mode. WebGL rewrite.
// Replaces the old Canvas 2D photo renderer. Exposes: window.NatureMode, window.NatureControls, window.NATURE_DEFAULTS

const { useEffect: nmUE, useRef: nmUR, useState: nmUS } = React;

const NATURE_FS = `
precision highp float;
varying vec2 v_uv;
uniform sampler2D u_tex;
uniform vec2  u_resolution;
uniform vec2  u_imgSize;
uniform vec2  u_mouse;
uniform vec2  u_mouseRaw;
uniform float u_time;
uniform float u_strength;
uniform float u_blur;
uniform float u_split;
uniform float u_clickPulse;
uniform float u_hue;
uniform float u_sat;
uniform float u_contrast;
uniform float u_grain;
uniform float u_vignette;
uniform int   u_effect;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }

vec2 coverUV(vec2 uv){
  float vAR = u_resolution.x / u_resolution.y;
  float iAR = u_imgSize.x / u_imgSize.y;
  vec2 scale = vAR > iAR ? vec2(1.0, iAR/vAR) : vec2(vAR/iAR, 1.0);
  return (uv - 0.5) * scale + 0.5;
}

vec3 applyColor(vec3 c){
  float a = u_hue * 6.28318;
  float ca = cos(a), sa = sin(a);
  vec3 lumAxis = normalize(vec3(0.299, 0.587, 0.114));
  vec3 col = c * ca + cross(lumAxis, c) * sa + lumAxis * dot(lumAxis, c) * (1.0 - ca);
  vec3 gray = vec3(dot(col, vec3(0.299,0.587,0.114)));
  col = mix(gray, col, u_sat);
  col = (col - 0.5) * u_contrast + 0.5;
  return col;
}

vec3 sampleImage(vec2 uv){
  return texture2D(u_tex, coverUV(clamp(uv, 0.001, 0.999))).rgb;
}

void main(){
  vec2 uv = v_uv;
  vec2 toM = uv - u_mouseRaw;
  float dm = length(toM);
  float wide = exp(-dm * dm * 4.2);
  float pulse = u_clickPulse * exp(-dm * dm * 2.8);
  vec3 col;

  if (u_effect == 0) {
    float swirl = (u_strength * 2.8 + pulse * 1.4) * wide;
    float ang = swirl * 2.2;
    mat2 R = mat2(cos(ang), -sin(ang), sin(ang), cos(ang));
    vec2 d = R * toM - toM;
    float push = (u_strength * 0.12 + pulse * 0.06) * wide;
    vec2 disp = d * 0.65 + normalize(toM + 0.0001) * (-push);
    col = sampleImage(uv + disp);

  } else if (u_effect == 1) {
    float radius = (u_blur * 0.55 + pulse * 0.35) * wide * 0.065 + u_blur * 0.007;
    vec3 acc = vec3(0.0); float tw = 0.0;
    for(int i=-4;i<=4;i++){
      for(int j=-4;j<=4;j++){
        vec2 off = vec2(float(i),float(j)) * radius * 0.46;
        float k = exp(-float(i*i+j*j) * 0.38);
        acc += sampleImage(uv + off) * k;
        tw += k;
      }
    }
    col = acc / tw;

  } else if (u_effect == 2) {
    float amt = (u_split * 0.85 + pulse * 0.55) * wide * 0.046 + 0.0008;
    vec2 dir = normalize(toM + 0.0001);
    col.r = sampleImage(uv - dir * amt * 1.0).r;
    col.g = sampleImage(uv + dir * amt * 0.1).g;
    col.b = sampleImage(uv + dir * amt * 1.0).b;

  } else if (u_effect == 3) {
    float n = sin(uv.x * 16.0 + u_time * 0.65) * 0.42 + 0.5;
    float warp = (u_strength * 1.6 + pulse) * wide * 0.26 * n;
    float sway = (u_mouse.x - 0.5) * u_strength * 0.04 * wide;
    col = sampleImage(uv + vec2(sway, warp));

  } else {
    col = sampleImage(uv);
    vec2 cell = uv * u_resolution / max(u_resolution.x,u_resolution.y) * (12.0 + u_strength * 14.0);
    vec2 fr = fract(cell) - 0.5;
    float ring = 1.0 - smoothstep(0.18, 0.5, length(fr));
    float h2 = hash(floor(cell));
    float glow = (u_strength * 0.55 + pulse * 0.5) * ring * max(0.0, 1.0 - dm * 3.0) * h2;
    col += glow * vec3(0.95, 0.88, 0.72);
    col = mix(col, col * 1.06, wide * u_strength * 0.5);
  }

  col = applyColor(col);

  if (u_grain > 0.0) {
    float g = hash(uv * u_resolution + u_time * 60.0) - 0.5;
    col += g * u_grain * 0.16;
  }

  float vg = smoothstep(1.35, 0.12, length(uv - 0.5));
  col *= mix(1.0 - u_vignette * 0.68, 1.0, vg);

  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}
`;

function imgToTexture(gl, img) {
  const tc = document.createElement('canvas');
  const scale = Math.min(1, 4096 / Math.max(img.naturalWidth || img.width, img.naturalHeight || img.height));
  tc.width = Math.max(1, Math.round((img.naturalWidth || img.width) * scale));
  tc.height = Math.max(1, Math.round((img.naturalHeight || img.height) * scale));
  const ctx = tc.getContext('2d', { willReadFrequently:false });
  ctx.drawImage(img, 0, 0, tc.width, tc.height);
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, tc);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  return { tex, w: tc.width, h: tc.height };
}

function NatureMode({ tweaks, registerSnapshot, mouseRef, currentImg }) {
  const canvasRef = nmUR(null);
  const glRef = nmUR(null);
  const progRef = nmUR(null);
  const uniRef = nmUR({});
  const texRef = nmUR(null);
  const imgDimRef = nmUR({ w:1, h:1 });
  const stateRef = nmUR({ pulse:0, t:0 });
  const [loaded, setLoaded] = nmUS(false);

  WP.useStageSize(canvasRef);

  nmUE(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const gl = canvas.getContext('webgl', { preserveDrawingBuffer:true, antialias:false });
    if (!gl) { console.error('WebGL not available'); return; }
    glRef.current = gl;
    const prog = WP.compileProgram(gl, WP.VS_FULLSCREEN, NATURE_FS);
    if (!prog) return;
    progRef.current = prog;
    gl.useProgram(prog);
    WP.createQuadGeometry(gl, prog);
    const names = ['u_tex','u_resolution','u_imgSize','u_mouse','u_mouseRaw','u_time','u_strength','u_blur','u_split','u_clickPulse','u_hue','u_sat','u_contrast','u_grain','u_vignette','u_effect'];
    const u = {};
    names.forEach(n => { u[n] = gl.getUniformLocation(prog, n); });
    uniRef.current = u;
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([8,1,95,255]));
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    texRef.current = tex;
  }, []);

  nmUE(() => {
    const gl = glRef.current;
    if (!currentImg) { setLoaded(false); return; }
    if (!gl) return;
    setLoaded(false);
    const img = new Image();
    img.onload = () => {
      const activeGl = glRef.current;
      if (!activeGl) return;
      try {
        const result = imgToTexture(activeGl, img);
        if (texRef.current) activeGl.deleteTexture(texRef.current);
        texRef.current = result.tex;
        imgDimRef.current = { w: result.w, h: result.h };
        setLoaded(true);
      } catch (err) {
        console.error('Texture upload failed:', err);
        setLoaded(false);
      }
    };
    img.onerror = () => { console.warn('Failed to load:', currentImg); setLoaded(false); };
    // Do not set crossOrigin for local relative images. It can break file:// testing in Safari.
    if (/^https?:\/\//i.test(currentImg)) img.crossOrigin = 'anonymous';
    img.src = currentImg;
  }, [currentImg, glRef.current]);

  nmUE(() => {
    const onDown = (e) => {
      if (e.target.closest('.panel,.icon-btn,.rail,.layout-card,.palette-card,.nature-thumb,.swatch,.color-wheel-card,.eyedropper-follow,.formation-card,button,input,.drop-zone')) return;
      stateRef.current.pulse = 1.0;
    };
    window.addEventListener('mousedown', onDown);
    return () => window.removeEventListener('mousedown', onDown);
  }, []);

  const drawAt = (targetW, targetH) => {
    const gl = glRef.current;
    const prog = progRef.current;
    const u = uniRef.current;
    if (!gl || !prog || !texRef.current) return;
    gl.viewport(0, 0, targetW, targetH);
    gl.useProgram(prog);
    const m = mouseRef?.current || { x:.5, y:.5, chaosX:.5, chaosY:.5 };
    const t = performance.now() / 1000;
    const effectMap = { warp:0, blur:1, split:2, melt:3, nodes:4 };
    const effectIdx = effectMap[tweaks.effect] ?? 0;
    const strength = tweaks.effect === 'blur' ? tweaks.blur : tweaks.effect === 'split' ? tweaks.split : tweaks.warp;
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, texRef.current);
    gl.uniform1i(u.u_tex, 0);
    gl.uniform2f(u.u_resolution, targetW, targetH);
    gl.uniform2f(u.u_imgSize, imgDimRef.current.w, imgDimRef.current.h);
    gl.uniform2f(u.u_mouse, m.chaosX, 1 - m.chaosY);
    gl.uniform2f(u.u_mouseRaw, m.x, 1 - m.y);
    gl.uniform1f(u.u_time, t);
    gl.uniform1f(u.u_strength, strength);
    gl.uniform1f(u.u_blur, tweaks.blur);
    gl.uniform1f(u.u_split, tweaks.split);
    gl.uniform1f(u.u_clickPulse, stateRef.current.pulse);
    gl.uniform1f(u.u_hue, tweaks.hue);
    gl.uniform1f(u.u_sat, tweaks.sat);
    gl.uniform1f(u.u_contrast, tweaks.contrast);
    gl.uniform1f(u.u_grain, tweaks.grain);
    gl.uniform1f(u.u_vignette, tweaks.vignette);
    gl.uniform1i(u.u_effect, effectIdx);
    gl.drawArrays(gl.TRIANGLES, 0, 6);
  };

  WP.useAnimationLoop((t, dt) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    stateRef.current.t += dt;
    stateRef.current.pulse *= Math.exp(-dt * 1.55);
    drawAt(canvas.width, canvas.height);
  });

  nmUE(() => {
    registerSnapshot(() => {
      const canvas = canvasRef.current;
      if (!canvas || !loaded) return;
      const ow = canvas.width, oh = canvas.height, osw = canvas.style.width, osh = canvas.style.height;
      canvas.width = 3840; canvas.height = 2160;
      drawAt(3840, 2160);
      WP.downloadCanvas(canvas, `photo-${Date.now()}.png`);
      requestAnimationFrame(() => { canvas.width = ow; canvas.height = oh; canvas.style.width = osw; canvas.style.height = osh; });
    });
  }, [tweaks, registerSnapshot, loaded]);

  return <canvas ref={canvasRef} className="stage nature-stage" style={{ opacity: loaded ? 1 : 0.35, transition:'opacity 0.35s ease' }} />;
}

function NatureControls({ tweaks, setTweaks, natureImages, currentImg, setCurrentImg, onFiles }) {
  const inputRef = nmUR(null);
  const [dragOver, setDragOver] = nmUS(false);
  const onDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (files.length) onFiles(files);
  };
  const strengthKey = tweaks.effect === 'blur' ? 'blur' : tweaks.effect === 'split' ? 'split' : 'warp';
  return (
    <>
      <div className="section">
        <div className="section-label"><span className="name">Effect</span><span className="value">mouse-driven</span></div>
        <div className="seg">
          {['warp','blur','split','melt','nodes'].map(e => (
            <button key={e} className={'seg-opt' + (tweaks.effect === e ? ' active' : '')} onClick={() => setTweaks({ effect:e })}>{e}</button>
          ))}
        </div>
      </div>
      <div className="section">
        <div className="section-label"><span className="name">Strength</span><span className="value">{Math.round(tweaks[strengthKey] * 100)}</span></div>
        <input className="slider" type="range" min="0" max="1" step="0.01" value={tweaks[strengthKey]} onChange={e => setTweaks({ [strengthKey]:parseFloat(e.target.value) })} />
      </div>
      {[
        ['hue','Hue',-0.5,0.5,v => Math.round(v*360)+'°'],
        ['sat','Saturation',0,2.2,v => v.toFixed(2)],
        ['contrast','Contrast',0.4,1.9,v => v.toFixed(2)],
        ['grain','Grain',0,1,v => Math.round(v*100)],
        ['vignette','Vignette',0,1,v => Math.round(v*100)],
      ].map(([k,label,min,max,fmt]) => (
        <div className="section" key={k}>
          <div className="section-label"><span className="name">{label}</span><span className="value">{fmt(tweaks[k])}</span></div>
          <input className="slider" type="range" min={min} max={max} step="0.01" value={tweaks[k]} onChange={e => setTweaks({ [k]:parseFloat(e.target.value) })} />
        </div>
      ))}
      <div className="section">
        <div className="section-label"><span className="name">Images</span><span className="value">{natureImages.length > 0 ? `${natureImages.length} loaded` : 'none yet'}</span></div>
        {natureImages.length > 0 && (
          <div className="nature-grid">
            {natureImages.map((url, i) => (
              <button key={i} className={'nature-thumb' + (url === currentImg ? ' active' : '')} onClick={() => setCurrentImg(url)}>
                <img src={url} alt="" />
              </button>
            ))}
          </div>
        )}
        <div className={'drop-zone' + (dragOver ? ' dragover' : '')} onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={onDrop} onClick={() => inputRef.current?.click()}>
          <strong>Add photos</strong><br />Drag here or click — works immediately.
          <input ref={inputRef} type="file" accept="image/*" multiple style={{ display:'none' }} onChange={e => { onFiles(Array.from(e.target.files)); e.target.value = ''; }} />
        </div>
        <div className="folder-widget">
          <div className="folder-title">Permanent library</div>
          <p>Drop files in <code>nature/</code> + add to <code>nature/manifest.json</code>:</p>
          <code>["01.jpg", "02.jpg"]</code>
        </div>
      </div>
      <div className="help">Move cursor over image — all effects respond live. Click for a pulse.</div>
    </>
  );
}

window.NatureMode = NatureMode;
window.NatureControls = NatureControls;
window.NATURE_DEFAULTS = {
  effect:'warp', warp:0.45, blur:0.50, split:0.55,
  hue:0, sat:1.0, contrast:1.0, grain:0.04, vignette:0.22,
