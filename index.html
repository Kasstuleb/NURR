      Support me
    </a>
</div>
<div aria-hidden="true" class="nurr-kofi-modal" id="nurrKofiModal">
<button aria-label="Close support window" class="nurr-kofi-backdrop" id="nurrKofiClose" type="button"></button>
<div class="nurr-kofi-window">
<button aria-label="Close" class="nurr-kofi-x" id="nurrKofiCloseBtn" type="button">×</button>
<iframe loading="lazy" src="https://ko-fi.com/kasstuleb/?hidefeed=true&amp;widget=true&amp;embed=true&amp;preview=true" title="Support NURR on Ko-fi">
</iframe>
</div>
</div>
<script>
    window.addEventListener('load', function () {
      const openBtn = document.getElementById('nurrSupportOpen');
      const modal = document.getElementById('nurrKofiModal');
      const closeBg = document.getElementById('nurrKofiClose');
      const closeBtn = document.getElementById('nurrKofiCloseBtn');

      function openModal(event) {
        if (!modal) return;
        event.preventDefault();
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeModal() {
        if (!modal) return;
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
      }

      if (openBtn) openBtn.onclick = openModal;
      if (closeBg) closeBg.onclick = closeModal;
      if (closeBtn) closeBtn.onclick = closeModal;

      window.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') closeModal();
      });
    });
  </script>
