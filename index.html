<!DOCTYPE html>

<head>

<link rel="stylesheet" href="css/mobile.css?v=git-cache-20260521-3d-sync-1" />
<link rel="stylesheet" href="css/color-picker-working.css?v=git-cache-20260521-3d-sync-1" />
<link rel="stylesheet" href="css/color-picker-input-fix.css?v=git-cache-20260521-3d-sync-1" />

<link rel="stylesheet" href="css/gradient.css?v=git-cache-20260521-3d-sync-1" />
<link rel="stylesheet" href="css/geometric.css?v=git-cache-20260521-3d-sync-1" />

<link rel="stylesheet" href="css/abstract.css?v=git-cache-20260521-3d-sync-1" />
<link rel="stylesheet" href="css/palette-mode.css?v=git-cache-20260521-3d-sync-1" />
<link rel="stylesheet" href="css/palette-swatches-harmonize.css?v=git-cache-20260521-3d-sync-1" />
</head>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script src="js/helpers.js?v=git-cache-20260521-3d-sync-1"></script>
  <script type="text/babel" src="js/palette.js?v=git-cache-20260521-3d-sync-1"></script>

  <script src="js/gradient-curated-palettes.js?v=git-cache-20260521-3d-sync-1"></script>
  <script src="js/texture-presets.js?v=git-cache-20260521-3d-sync-1"></script>
  <script src="js/texture-engine.js?v=git-cache-20260521-3d-sync-1"></script>
  <script type="text/babel" src="js/gradient.js?v=git-cache-20260521-3d-sync-1"></script>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="js/glass3d-renderer.js?v=git-cache-20260521-3d-sync-1"></script>
  <script type="text/babel" src="js/geometric.js?v=git-cache-20260521-3d-sync-1"></script>
  <script type="text/babel" src="js/glass3d-mode.js?v=git-cache-20260521-3d-sync-1"></script>
  <script type="text/babel" src="js/nature.js?v=git-cache-20260521-3d-sync-1"></script>
  <script type="text/babel" src="js/abstract.js?v=git-cache-20260521-3d-sync-1"></script>
  <script type="text/babel" src="js/palette-lab-mode.js?v=git-cache-20260521-3d-sync-1"></script>
  <script type="text/babel" src="js/app.js?v=git-cache-20260521-3d-sync-1"></script>
  <script src="js/mobile.js?v=git-cache-20260521-3d-sync-1"></script>

  <div class="nurr-support-strip">
    <span>NURR is independent.</span>
    <a
      href="https://ko-fi.com/kasstuleb"
      target="_blank"
      rel="noopener noreferrer"
      id="nurrSupportOpen"
    >
      Support me
    </a>
  </div>

  <div class="nurr-kofi-modal" id="nurrKofiModal" aria-hidden="true">
    <button type="button" class="nurr-kofi-backdrop" id="nurrKofiClose" aria-label="Close support window"></button>

    <div class="nurr-kofi-window">
      <button type="button" class="nurr-kofi-x" id="nurrKofiCloseBtn" aria-label="Close">×</button>

      <iframe
        src="https://ko-fi.com/kasstuleb/?hidefeed=true&widget=true&embed=true&preview=true"
        title="Support NURR on Ko-fi"
        loading="lazy">
      </iframe>
    </div>
  </div>

  <script>
    window.addEventListener('load', function () {
      const openBtn = document.getElementById('nurrSupportOpen');
      const modal = document.getElementById('nurrKofiModal');
      const closeBg = document.getElementById('nurrKofiClose');
      const closeBtn = document.getElementById('nurrKofiCloseBtn');

      function openModal(event) {
        if (!modal) return;
        event.preventDefault();
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeModal() {
        if (!modal) return;
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
      }

      if (openBtn) openBtn.onclick = openModal;
      if (closeBg) closeBg.onclick = closeModal;
      if (closeBtn) closeBtn.onclick = closeModal;

      window.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') closeModal();
      });
    });
  </script>
</body>
</html>
